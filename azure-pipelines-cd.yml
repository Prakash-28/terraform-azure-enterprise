trigger: none
pr: none

resources:
  pipelines:
    - pipeline: terraformCI
      source: terraform-azure-enterprise-ci
      trigger:
        branches:
          include:
            - main
            - master

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: "Azure-Service-Connection"
  workingDirectory: $(System.DefaultWorkingDirectory)
  planFile: tfplan
  # Configure azureServiceConnection as an Azure Resource Manager service connection using workload identity federation.

stages:
  - stage: Apply
    displayName: Terraform Apply
    jobs:
      - deployment: apply
        displayName: Apply Terraform Plan
        environment: terraform-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: PowerShell@2
                  displayName: Install Terraform
                  inputs:
                    pwsh: true
                    targetType: inline
                    script: |
                      $ErrorActionPreference = 'Stop'

                      $tfVersion = '1.15.8'
                      $zipPath = Join-Path $env:AGENT_TEMPDIRECTORY "terraform_${tfVersion}_linux_amd64.zip"
                      $installDir = Join-Path $env:AGENT_TEMPDIRECTORY 'terraform-bin'

                      Invoke-WebRequest -Uri "https://releases.hashicorp.com/terraform/$tfVersion/terraform_${tfVersion}_linux_amd64.zip" -OutFile $zipPath
                      New-Item -ItemType Directory -Path $installDir -Force | Out-Null
                      Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

                      Write-Host "##vso[task.prependpath]$installDir"
                      $env:PATH = "${installDir}:$env:PATH"

                - task: DownloadPipelineArtifact@2
                  displayName: Download Plan Artifact from CI
                  inputs:
                    buildType: specific
                    project: $(System.TeamProject)
                    pipeline: $(resources.pipeline.terraformCI.pipelineID)
                    runVersion: specific
                    runId: $(resources.pipeline.terraformCI.runID)
                    artifactName: terraform-plan
                    targetPath: $(workingDirectory)

                - task: AzureCLI@2
                  displayName: Terraform Init and Apply
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: pscore
                    scriptLocation: inlineScript
                    workingDirectory: $(workingDirectory)
                    inlineScript: |
                      $ErrorActionPreference = 'Stop'

                      az account show
                      terraform version
                      terraform init -reconfigure -upgrade
                      terraform apply -auto-approve $(planFile)
