trigger: none
pr: none

resources:
  pipelines:
    - pipeline: terraformCI
      source: terraform-azure-enterprise-ci
      trigger:
        branches:
          include:
            - main
            - master

pool:
  vmImage: ubuntu-latest

variables:
  workingDirectory: $(System.DefaultWorkingDirectory)
  planFile: tfplan
  # Set these in Azure DevOps Variables (mark ARM_CLIENT_SECRET as secret).
  ARM_CLIENT_ID: "f915da9a-36b2-4ba1-aa53-80a73c95cb82"
  ARM_TENANT_ID: "24f51288-71f7-4dad-b039-7e6cb6747430"
  ARM_SUBSCRIPTION_ID: "ab5f7d8f-0d00-44d8-af07-0180e47f887b"

stages:
  - stage: Apply
    displayName: Terraform Apply
    jobs:
      - deployment: apply
        displayName: Apply Terraform Plan
        environment: terraform-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: DownloadPipelineArtifact@2
                  displayName: Download Plan Artifact from CI
                  inputs:
                    buildType: specific
                    project: $(System.TeamProject)
                    pipeline: $(resources.pipeline.terraformCI.pipelineID)
                    runVersion: specific
                    runId: $(resources.pipeline.terraformCI.runID)
                    artifactName: terraform-plan
                    targetPath: $(workingDirectory)

                - task: Bash@3
                  displayName: Terraform Init and Apply
                  inputs:
                    workingDirectory: $(workingDirectory)
                    targetType: inline
                    inlineScript: |
                      set -euo pipefail

                      terraform version
                      terraform init -reconfigure
                      terraform apply -auto-approve $(planFile)
                  env:
                    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                    ARM_TENANT_ID: $(ARM_TENANT_ID)
                    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                    ARM_USE_MSI: "false"
