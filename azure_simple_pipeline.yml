parameters:
  - name: environment
    displayName: 'Select Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - test
      - prod

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  tfVersion: '1.15.8'
  workingDirectory: '$(System.DefaultWorkingDirectory)'
  
  ${{ if eq(parameters.environment, 'dev') }}:
    tfvarsFile: 'environments/dev.tfvars'
    backendKey: 'dev.tfstate'
    serviceConnection: 'Azure-Service-Connection-DevOps'
    
  ${{ if eq(parameters.environment, 'test') }}:
    tfvarsFile: 'environments/test.tfvars'
    backendKey: 'test.tfstate'
    serviceConnection: 'Azure-Service-Connection-DevOps'
    
  ${{ if eq(parameters.environment, 'prod') }}:
    tfvarsFile: 'environments/prod.tfvars'
    backendKey: 'prod.tfstate'
    serviceConnection: 'Azure-Service-Connection-DevOps'

stages:
  - stage: Plan
    displayName: Terraform Init and Plan
    jobs:
      - job: plan
        displayName: Validate and Plan
        steps:
          - checkout: self

          - task: PowerShell@2
            displayName: Install Terraform
            inputs:
              pwsh: true
              targetType: inline
              script: |
                $ErrorActionPreference = 'Stop'

                $tfVersion = '$(tfVersion)'
                $zipPath = Join-Path $env:AGENT_TEMPDIRECTORY "terraform_${tfVersion}_linux_amd64.zip"
                $installDir = Join-Path $env:AGENT_TEMPDIRECTORY 'terraform-bin'

                Invoke-WebRequest -Uri "https://releases.hashicorp.com/terraform/$tfVersion/terraform_${tfVersion}_linux_amd64.zip" -OutFile $zipPath
                New-Item -ItemType Directory -Path $installDir -Force | Out-Null
                Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

                Write-Host "##vso[task.prependpath]$installDir"
                $env:PATH = "${installDir}:$env:PATH"

          # Terraform Init, Format, Validate and Plan
          - task: AzureCLI@2
            displayName: 'Terraform Init, Validate and Plan for ${{ parameters.environment }}'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(workingDirectory)'

              inlineScript: |
                echo "Planning Terraform for environment: ${{ parameters.environment }}"
                terraform init -backend-config="key=$(backendKey)"
                terraform fmt -check
                terraform validate
                terraform plan \
                  -var-file="$(tfvarsFile)" \
                  -out=tfplan-${{ parameters.environment }}

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Terraform Plan Artifact'
            inputs:
              targetPath: '$(workingDirectory)/tfplan-${{ parameters.environment }}'
              artifact: 'terraform-plan-${{ parameters.environment }}'
              publishLocation: pipeline

  - stage: ApprovalGate
    displayName: Approval Gate - Production
    dependsOn: Plan
    condition: eq('${{ parameters.environment }}', 'prod')
    jobs:
      - job: waitForValidation
        displayName: Wait for Manual Approval
        timeoutInMinutes: 1440
        steps:
          - task: ManualValidation@0
            displayName: 'Approve Production Deployment'
            inputs:
              notifyUsers: 'prakash.vidjiacoumar@gmail.com'
              instructions: 'Review the Terraform plan and approve for production deployment. This will apply infrastructure changes to your production environment.'
  - stage: Apply
    displayName: Terraform Apply (CD)
    dependsOn: 
      - Plan
      - ApprovalGate
    condition: |
      and(
        succeeded('Plan'),
        or(
          eq('${{ parameters.environment }}', 'dev'),
          eq('${{ parameters.environment }}', 'test'),
          succeeded('ApprovalGate')
        )
      )
    jobs:
      - job: apply
        displayName: Apply Terraform Plan
        steps:
          - checkout: self

          - task: PowerShell@2
            displayName: Install Terraform
            inputs:
              pwsh: true
              targetType: inline
              script: |
                $ErrorActionPreference = 'Stop'

                $tfVersion = '$(tfVersion)'
                $zipPath = Join-Path $env:AGENT_TEMPDIRECTORY "terraform_${tfVersion}_linux_amd64.zip"
                $installDir = Join-Path $env:AGENT_TEMPDIRECTORY 'terraform-bin'

                Invoke-WebRequest -Uri "https://releases.hashicorp.com/terraform/$tfVersion/terraform_${tfVersion}_linux_amd64.zip" -OutFile $zipPath
                New-Item -ItemType Directory -Path $installDir -Force | Out-Null
                Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

                Write-Host "##vso[task.prependpath]$installDir"
                $env:PATH = "${installDir}:$env:PATH"

          - task: DownloadPipelineArtifact@2
            displayName: Download Terraform Plan
            inputs:
              artifactName: 'terraform-plan-${{ parameters.environment }}'
              targetPath: '$(workingDirectory)'

          - task: AzureCLI@2
            displayName: 'Terraform Apply for ${{ parameters.environment }}'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(workingDirectory)'

              inlineScript: |
                echo "=== Applying Terraform for environment: ${{ parameters.environment }} ==="
                terraform init -backend-config="key=$(backendKey)"
                terraform apply -auto-approve tfplan-${{ parameters.environment }}
                echo "=== Successfully applied infrastructure changes ==="